<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sheet Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Sheet Capture</h1>

      <label>
        Apps Script URL
        <input id="scriptUrl" type="url" placeholder="https://script.google.com/.../exec" />
      </label>

      <div class="row two">
        <label>
          name
          <input id="name" type="text" />
        </label>
        <label>
          brand
          <input id="brand" type="text" />
        </label>
      </div>

      <div class="row two">
        <label>
          type
          <select id="type">
            <option value="未分類" selected>未分類</option>
            <option value="衣服">衣服</option>
            <option value="コスメ">コスメ</option>
            <option value="ガジェット">ガジェット</option>
          </select>
        </label>
        <label>
          status
          <select id="item_status">
            <option value="ほしい" selected>ほしい</option>
            <option value="もってる">もってる</option>
            <option value="手放す">手放す</option>
          </select>
        </label>
      </div>

      <div class="row two">
        <label>
          color
          <input id="color" type="text" />
        </label>
        <div></div>
      </div>

      <div class="row two">
        <label>
          purchase_date
          <input id="purchase_date" type="date" />
        </label>
        <label>
          price
          <input id="price" type="number" min="0" step="1" />
        </label>
      </div>

      <label>
        image_url
        <input id="image_url" type="url" />
      </label>
      <div class="image-preview-wrap" aria-label="image preview">
        <div class="image-preview-title">Content Image</div>
        <div class="image-preview-grid">
          <img id="imagePreview" class="image-preview" alt="preview" />
          <div class="image-preview-placeholder" aria-hidden="true">+</div>
        </div>
      </div>
      <label>
        memo
        <textarea id="memo" rows="2"></textarea>
      </label>

      <input id="category" type="hidden" value="未分類" />
      <input id="category2" type="hidden" value="" />
      <input id="url" type="hidden" value="" />
      <input id="site" type="hidden" value="" />
      <input id="raw_text" type="hidden" value="" />

      <div class="actions">
        <button id="extractBtn" type="button" class="secondary">現在ページから抽出</button>
        <button id="saveBtn" type="button">Save to Sheet</button>
      </div>

      <p id="status" class="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
