<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniClo OCR Beta</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>OCR Beta</h1>
      <p>OCR取り込みを本体から切り離したベータ画面</p>
    </header>

    <section class="card">
      <div class="grid two">
        <label>
          取得元ヒント
          <select id="ocrSourceHint">
            <option value="auto">自動判定</option>
            <option value="amazon">Amazon</option>
            <option value="qoo10">Qoo10</option>
            <option value="unknown">不明</option>
          </select>
        </label>
        <label>
          Apps Script URL
          <input id="scriptUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
        </label>
      </div>

      <div class="grid two">
        <label>
          OCR画像
          <input id="ocrImageInput" type="file" accept="image/*" />
        </label>
        <div class="actions right">
          <button id="ocrRunBtn" type="button" class="primary">OCR実行</button>
          <button id="ocrParseBtn" type="button">テキスト再解析</button>
          <button id="ocrSaveBtn" type="button">シートに登録</button>
        </div>
      </div>

      <p id="ocrStatusText" class="status">画像を選択してください</p>
      <img id="ocrPreviewImage" class="preview" alt="ocr preview" hidden />
    </section>

    <section class="card">
      <label>
        OCR全文
        <textarea id="ocrRawText" rows="8" placeholder="OCR結果"></textarea>
      </label>

      <div class="grid four">
        <label>注文日<input id="ocrOrderDate" type="date" /></label>
        <label>注文ID<input id="ocrOrderId" type="text" /></label>
        <label>注文合計<input id="ocrOrderTotal" type="number" min="0" /></label>
        <label>支払方法<input id="ocrOrderPayment" type="text" /></label>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>商品名</th>
              <th>カテゴリ</th>
              <th>サブカテゴリ</th>
              <th>ブランド</th>
              <th>状態</th>
              <th>数量</th>
              <th>価格</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="ocrItemRows"></tbody>
        </table>
      </div>

      <div class="actions">
        <button id="ocrAddItemBtn" type="button">+ 商品行を追加</button>
      </div>
    </section>
  </main>
</body>
</html>
